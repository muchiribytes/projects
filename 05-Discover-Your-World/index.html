<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width= , initial-scale=1.0">
  <title>Discover Your World</title>
  <link rel="icon" type="image/x-icon" href="https://edube.org/uploads/media/default/0001/04/web-favicon.png">

  <script src="script.js" defer></script>
</head>
<body>

  <h1>Discover Your World &#x1F30D;</h1>

  <p>Click the button to learn about the continent you're on and some famous geographical features.</p>

  <button id="getLocation">Discover Location</button>

  <img src="https://edube.org/uploads/media/default/0001/04/continents.jpg" usemap="#image-map" alt="World Map">
  <map name="image-map">
    <area id="north-america" shape="rect" coords="386,283,41,17" alt="North America" title="North America" href="#">
    <area id="south-america" shape="rect" coords="209,501,358,288" alt="South America" title="South America" href="#">
    <area id="europe" shape="rect" coords="391,68,505,217" alt="Europe" title="Europe" href="#">
    <area id="africa" shape="rect" coords="533,217,387,448" alt="Africa" title="Africa" href="#">
    <area id="asia" shape="rect" coords="893,153,506,1" alt="Asia" title="Asia" href="#">
    <area id="australia-and-oceania" shape="rect" coords="679,353,872,480" alt="Australia and Oceania" title="Australia and Oceania" href="#">
  </map>
  
</body>
</html>
