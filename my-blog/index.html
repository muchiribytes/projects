<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personall Blog</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Inline styles (highest specificity) -->
  <style>
    p {
      color: slategray;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <header id="header">
    <h1 style="color: blue; font-size: 24px;">Welcome to My Blog</h1>
  </header>

  <main>
    <section>
      <h2>About Me</h2>
      <p>Hi, I'm a budding front-end developer learning CSS! I enjoy adding long text to my webpage to demonstrate how the ::first-line pseudo-element works for visitors.</p>
    </section>
    <section>
      <h2>My Interests</h2>
      <p>I love <span class="highlight">coding,</span> reading and cycling.</p>
    </section>
  </main>

  <footer>
    <p>Contact: <a href="mailto:" target="_blank">info@myblog.com</a></p>
  </footer>
  
</body>
</html>
